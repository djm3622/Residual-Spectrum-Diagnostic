experiment:
  name: reaction_diffusion
grid:
  nx: 64
  ny: 64
  Lx: 2.0
  Ly: 2.0
physics:
  Du: 0.001
  Dv: 0.005
  F: 0.022
  k: 0.005
time:
  t_final: 5.0
  n_snapshots: 101
  dt: 0.04999995231628418
data:
  n_train_trajectories: 100
  n_test_trajectories: 10
  initial_condition: center_square
  initial_square_size: 20
  initial_noise_amplitude: 0.01
  external:
    source: pdebench
    pdebench:
      file_path: external_data/pdebench/2D/diffusion-reaction/2D_diff-react_NA_NA_64.h5
      dataset_key: data
      layout: THWC
      channel_index: 0
      sample_grouped: true
      spatial_stride: 1
      dt: 0.04999995231628418
      sim:
        Du: 0.001
        Dv: 0.005
        k: 0.005
        t: 5
        tdim: 501
        x_left: -1.0
        x_right: 1.0
        xdim: 512
        y_bottom: -1.0
        y_top: 1.0
        ydim: 512
        n: 1
        seed: 0
      missing_physics:
      - F
      time_stride: 1
      n_train: 100
      n_test: 10
      shuffle: true
      split_seed_offset: 1207
      u_channel_index: 0
      v_channel_index: 1
training:
  device: cuda
  loss: l2
  noise_level: 0.03
  lr: 0.001
  n_iter: 300
  batch_size: 32
  grad_clip: 1.0
  rollout_horizon: 10
  rollout_weight: 0.8
  validation_fraction: 0.2
  u_weight: 1.5
  v_weight: 1.0
  channel_balance_cap: 3.0
  dynamics_weight: 0.2
  early_step_bias: 1.0
  early_step_decay: 24.0
  neural_operator:
    common:
      n_modes:
      - 20
      - 20
      hidden_channels: 32
      n_layers: 6
      lifting_channel_ratio: 2.0
      projection_channel_ratio: 2.0
      use_channel_mlp: true
      channel_mlp_expansion: 0.75
      channel_mlp_dropout: 0.15
      fno_skip: linear
      channel_mlp_skip: soft-gating
      norm: null
      domain_padding: 0.0
      implementation: factorized
      separable: false
      rank: 1.0
    tfno:
      hidden_channels: 32
      n_layers: 6
      factorization: Tucker
      rank: 0.2
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 8
    fno:
      hidden_channels: 32
      n_layers: 4
    uno:
      hidden_channels: 32
      n_layers: 4
      lifting_channels: 224
      projection_channels: 224
      channel_mlp_skip: linear
      uno_out_channels:
      - 80
      - 112
      - 112
      - 112
      - 80
      uno_n_modes:
      - - 12
        - 12
      - - 12
        - 12
      - - 12
        - 12
      - - 12
        - 12
      - - 12
        - 12
      uno_scalings:
      - - 1.0
        - 1.0
      - - 0.5
        - 0.5
      - - 1.0
        - 1.0
      - - 1.0
        - 1.0
      - - 2.0
        - 2.0
progress:
  enabled: true
  data_generation: true
  training: true
  evaluation: true
rsd:
  basis: fourier
  omega_1_frac: 0.0625
  omega_2_frac: 0.1666666667
  assume_no_forcing: true
paths:
  output_dir: output
  checkpoint_dir: checkpoints
artifacts:
  save_figures: true
  save_fit_visualizations: true
  save_trajectory_visualizations: true
  fit_visualization:
    input:
      cmap: cividis
      border_color: '#2A9D8F'
      border_width: 2.0
    output:
      cmap: viridis
  trajectory_visualization:
    instance_indices:
    - 0
    - 2
    step_indices:
    - 0
    - 20
    - 40
    - 60
    - 80
    - 100
    - 120
  eval_pair_index: 20
  test_case_index: 0
  test_step_index: 20
