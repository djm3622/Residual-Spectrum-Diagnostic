experiment:
  name: reaction_diffusion
grid:
  nx: 64
  ny: 64
  Lx: 2.0
  Ly: 2.0
physics:
  Du: 0.001
  Dv: 0.005
  F: 0.022
  k: 0.005
time:
  t_final: 5.0
  n_snapshots: 101
  dt: 0.04999995231628418
data:
  n_train_trajectories: 100
  n_test_trajectories: 10
  initial_condition: center_square
  initial_square_size: 20
  initial_noise_amplitude: 0.01
  external:
    source: pdebench
    pdebench:
      file_path: external_data/pdebench/2D/diffusion-reaction/2D_diff-react_NA_NA_64.h5
      dataset_key: data
      layout: THWC
      channel_index: 0
      sample_grouped: true
      spatial_stride: 1
      dt: 0.04999995231628418
      sim:
        Du: 0.001
        Dv: 0.005
        k: 0.005
        t: 5
        tdim: 501
        x_left: -1.0
        x_right: 1.0
        xdim: 512
        y_bottom: -1.0
        y_top: 1.0
        ydim: 512
        n: 1
        seed: 0
      missing_physics:
      - F
      time_stride: 1
      n_train: 100
      n_test: 10
      shuffle: true
      split_seed_offset: 1207
      u_channel_index: 0
      v_channel_index: 1
training:
  device: cuda
  loss: l2
  noise_level: 0.04
  lr: 0.001
  weight_decay: 0.0001
  use_one_cycle_lr: true
  one_cycle_pct_start: 0.3
  one_cycle_div_factor: 25.0
  one_cycle_final_div_factor: 10000.0
  checkpoint_every_epochs: 301
  early_stopping_patience: -1
  n_iter: 300
  batch_size: 32
  grad_clip: 1.0
  rollout_horizon: 10
  rollout_weight: 0.8
  validation_fraction: 0.2
  u_weight: 1.5
  v_weight: 1.0
  channel_balance_cap: 3.0
  dynamics_weight: 0.2
  early_step_bias: 1.0
  early_step_decay: 24.0
  neural_operator:
    common:
      n_modes:
      - 32
      - 32
      hidden_channels: 32
      n_layers: 4
      lifting_channel_ratio: 2.0
      projection_channel_ratio: 2.0
      use_channel_mlp: true
      channel_mlp_expansion: 4.0
      channel_mlp_dropout: 0.0
      fno_skip: linear
      channel_mlp_skip: soft-gating
      norm: group_norm
      domain_padding: 0.0
      implementation: factorized
      separable: false
      rank: 1.0
    tfno:
      hidden_channels: 32
      n_layers: 4
      factorization: Tucker
      rank: 1.0
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 10
    itfno:
      hidden_channels: 32
      n_layers: 4
      factorization: Tucker
      rank: 1.0
      implicit:
        steps: 8
        dt: 1.0
        relaxation: true
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 10
    uno:
      hidden_channels: 32
      n_layers: 4
      lifting_channels: 64
      projection_channels: 64
      channel_mlp_skip: linear
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 10
      uno_out_channels:
      - 32
      - 64
      - 64
      - 32
      uno_n_modes:
      - - 4
        - 12
        - 12
      - - 10
        - 32
        - 32
      - - 10
        - 32
        - 32
      - - 4
        - 12
        - 12
      uno_scalings:
      - - 1.0
        - 1.0
        - 1.0
      - - 0.5
        - 0.5
        - 0.5
      - - 1.0
        - 1.0
        - 1.0
      - - 2.0
        - 2.0
        - 2.0
    wno:
      # Switch profile to rd3d to run temporal next-block WNO (T x H x W operator).
      profile: rd3d
      wavelet: db4
      wavelet_transform: dwt
      use_channel_mlp: false
      profiles:
        rd2d:
          n_modes:
          - 32
          - 32
          blocks: 4
          wavelet_levels: 2
          wavelet_mode: symmetric
          temporal:
            enabled: false
        rd3d:
          n_modes:
          - 10
          - 32
          - 32
          blocks: 4
          wavelet_levels: 1
          wavelet_mode: periodic
          temporal:
            enabled: true
            input_steps: 20
            output_steps: 20
            target_mode: next_block
            n_modes_time: 10
    rno:
      hidden_channels: 32
      n_layers: 4
      factorization: Tucker
      rank: 1.0
      rno_skip: false
      recurrent:
        n_blocks: 4
        warmup_steps: 4
  baseline_models:
    common:
      norm: group_norm
      activation: gelu
      dropout: 0.0
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
    conv:
      width: 48
      model_depth: 4
    swin:
      pretrained: false
      freeze_backbone: false
      decoder_channels:
      - 128
      - 64
      - 64
      - 32
      - 32
      use_attention: true
      scse_reduction: 16
    attn_unet:
      base_channels: 64
      depth: 4
      scse_reduction: 16
progress:
  enabled: true
  data_generation: true
  training: true
  evaluation: true
rsd:
  basis: fourier
  omega_1_frac: 0.2
  omega_2_frac: 0.7
  spectral_band_count: 8
  assume_no_forcing: true
paths:
  output_dir: output
  checkpoint_dir: checkpoints
artifacts:
  save_figures: true
  save_fit_visualizations: true
  save_trajectory_visualizations: true
  fit_visualization:
    input:
      cmap: cividis
      border_color: '#2A9D8F'
      border_width: 2.0
    output:
      cmap: viridis
  trajectory_visualization:
    instance_indices:
    - 0
    - 2
    step_indices:
    - 0
    - 20
    - 40
    - 60
    - 80
    - 100
    - 120
  eval_pair_index: 20
  test_case_index: 0
  test_step_index: 20
