experiment:
  name: navier_stokes

grid:
  nx: 64
  ny: 64
  Lx: 6.283185307179586
  Ly: 6.283185307179586

physics:
  nu: 0.01
  forcing:
    type: sinusoidal
    amplitude: 3.0
    kx: 1
    ky: 2
    omega: 0.5
    phase: 0.0

time:
  t_final: 0.0019
  n_snapshots: 200
  dt_max: 0.001

data:
  n_train_trajectories: 12
  n_test_trajectories: 3
  initial_condition: line_wave
  initial_n_modes: 1
  initial_kmax: 1
  initial_target_rms: 0.0
  line_axis: diagonal_pos
  line_amplitude: 0.05

training:
  device: mps
  loss: combined
  noise_level: 0.04
  lr: 0.001
  n_iter: 500
  batch_size: 32
  grad_clip: 1.0
  rollout_horizon: 10
  rollout_weight: 0.8
  validation_fraction: 0.15
  model_width: 32
  model_depth: 5

  neural_operator:
    common:
      n_modes: [20, 20]
      hidden_channels: 32
      n_layers: 4
      lifting_channel_ratio: 2.0
      projection_channel_ratio: 2.0
      use_channel_mlp: true
      channel_mlp_expansion: 0.75
      channel_mlp_dropout: 0.0
      fno_skip: linear
      channel_mlp_skip: soft-gating
      norm: null
      domain_padding: 0.0
      implementation: factorized
      separable: false
      rank: 1.0
    tfno:
      factorization: Tucker
      rank: 0.2
    uno:
      hidden_channels: 32
      n_layers: 4
      lifting_channels: 192
      projection_channels: 192
      channel_mlp_skip: linear
      uno_out_channels: [72, 96, 96, 96, 72]
      uno_n_modes:
        - [12, 12]
        - [12, 12]
        - [12, 12]
        - [12, 12]
        - [12, 12]
      uno_scalings:
        - [1.0, 1.0]
        - [0.5, 0.5]
        - [1.0, 1.0]
        - [1.0, 1.0]
        - [2.0, 2.0]

progress:
  enabled: true
  data_generation: true
  training: true
  evaluation: true

rsd:
  basis: fourier
  omega_1_frac: 0.0625
  omega_2_frac: 0.1666666667

paths:
  output_dir: output
  checkpoint_dir: checkpoints

artifacts:
  save_figures: true
  save_fit_visualizations: true
  save_trajectory_visualizations: true
  fit_visualization:
    input:
      cmap: cividis
      border_color: "#2A9D8F"
      border_width: 2.0
    output:
      cmap: RdBu_r
  trajectory_visualization:
    instance_indices: [0, 1]
    step_indices: [0, 4, 8, 12, 16, 19]
  eval_pair_index: 0
  test_case_index: 0
  test_step_index: 0
