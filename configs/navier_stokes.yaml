experiment:
  name: navier_stokes
grid:
  nx: 64
  ny: 64
  Lx: 1.0
  Ly: 1.0
physics:
  nu: 0.01
  forcing:
    type: none
    amplitude: 0.0
    kx: 1
    ky: 2
    omega: 0.5
    phase: 0.0
time:
  t_final: 1.9999980926513672
  n_snapshots: 101
  dt_max: 0.001
data:
  n_train_trajectories: 968
  n_test_trajectories: 108
  initial_condition: line_wave
  initial_n_modes: 1
  initial_kmax: 1
  initial_target_rms: 0.0
  line_axis: diagonal_pos
  line_amplitude: 0.05
  external:
    source: pdebench
    neuraloperator:
      data_path: external_data/neuraloperator
      train_resolution: 64
      test_resolution: 64
      n_train: 0
      n_test: 0
      batch_size: 32
      test_batch_size: 32
      positional_encoding: true
      encode_input: false
      encode_output: false
      channel_dim: 1
      channel_index: 0
      dt: null
    pdebench:
      file_path: external_data/pdebench/2D/NS_incom/ns_incom_inhom_2d_64_omega.h5
      file_paths:
      - external_data/pdebench/2D/NS_incom/ns_incom_inhom_2d_64_omega_[0-9][0-9][0-9].h5
      dataset_key: omega
      layout: NTHW
      channel_index: 0
      time_stride: 1
      spatial_stride: 1
      n_train: 968
      n_test: 108
      shuffle: true
      split_seed_offset: 1207
      dt: 0.019999980926513672
training:
  device: cuda
  loss: l2
  noise_level: 0.04
  lr: 0.001
  weight_decay: 0.0001
  use_one_cycle_lr: true
  one_cycle_pct_start: 0.3
  one_cycle_div_factor: 25.0
  one_cycle_final_div_factor: 10000.0
  checkpoint_every_epochs: 101
  early_stopping_patience: -1
  n_iter: 100
  batch_size: 32
  grad_clip: 1.0
  rollout_horizon: 10
  rollout_weight: 0.8
  validation_fraction: 0.1
  neural_operator:
    common:
      n_modes:
      - 32
      - 32
      hidden_channels: 48
      n_layers: 4
      lifting_channel_ratio: 2.0
      projection_channel_ratio: 2.0
      use_channel_mlp: true
      channel_mlp_expansion: 4.0
      channel_mlp_dropout: 0.0
      fno_skip: linear
      channel_mlp_skip: soft-gating
      norm: group_norm
      domain_padding: 0.0
      implementation: factorized
      separable: false
      rank: 1.0
    tfno:
      hidden_channels: 48
      n_layers: 4
      factorization: Tucker
      rank: 1.0
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 10
    itfno:
      hidden_channels: 48
      n_layers: 4
      factorization: Tucker
      rank: 1.0
      implicit:
        steps: 8
        dt: 1.0
        relaxation: true
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 10
    uno:
      hidden_channels: 48
      n_layers: 4
      lifting_channels: 64
      projection_channels: 64
      channel_mlp_skip: linear
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 10
      uno_out_channels:
      - 48
      - 64
      - 64
      - 48
      uno_n_modes:
      - - 4
        - 12
        - 12
      - - 10
        - 32
        - 32
      - - 10
        - 32
        - 32
      - - 4
        - 12
        - 12
      uno_scalings:
      - - 1.0
        - 1.0
        - 1.0
      - - 0.5
        - 0.5
        - 0.5
      - - 1.0
        - 1.0
        - 1.0
      - - 2.0
        - 2.0
        - 2.0
    wno:
      # ns2d -> 2D one-step WNO, ns3d -> temporal next-block WNO (T x H x W operator).
      profile: ns3d
      wavelet: db4
      wavelet_transform: dwt
      use_channel_mlp: false
      profiles:
        ns2d:
          n_modes:
          - 32
          - 32
          blocks: 4
          wavelet_levels: 2
          wavelet_mode: symmetric
          temporal:
            enabled: false
        ns3d:
          n_modes:
          - 10
          - 32
          - 32
          blocks: 4
          wavelet_levels: 1
          wavelet_mode: periodic
          temporal:
            enabled: true
            input_steps: 20
            output_steps: 20
            target_mode: next_block
            n_modes_time: 8
    rno:
      hidden_channels: 48
      n_layers: 4
      factorization: Tucker
      rank: 1.0
      rno_skip: false
      recurrent:
        n_blocks: 4
        warmup_steps: 4
  baseline_models:
    common:
      norm: group_norm
      activation: gelu
      dropout: 0.0
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
    conv:
      width: 48
      model_depth: 4
    swin:
      pretrained: false
      freeze_backbone: false
      decoder_channels:
      - 128
      - 64
      - 64
      - 32
      - 32
      use_attention: true
      scse_reduction: 16
    attn_unet:
      base_channels: 64
      depth: 4
      scse_reduction: 16
progress:
  enabled: true
  data_generation: true
  training: true
  evaluation: true
rsd:
  basis: fourier
  omega_1_frac: 0.0625
  omega_2_frac: 0.1666666667
  spectral_band_count: 8
paths:
  output_dir: output
  checkpoint_dir: checkpoints
artifacts:
  save_figures: true
  save_fit_visualizations: true
  save_trajectory_visualizations: true
  fit_visualization:
    input:
      cmap: cividis
      border_color: '#2A9D8F'
      border_width: 2.0
    output:
      cmap: RdBu_r
  trajectory_visualization:
    instance_indices:
    - 0
    - 1
    step_indices:
    - 0
    - 20
    - 40
    - 60
    - 80
  eval_pair_index: 0
  test_case_index: 0
  test_step_index: 0
