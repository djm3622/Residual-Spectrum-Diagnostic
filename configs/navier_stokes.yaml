experiment:
  name: navier_stokes

grid:
  nx: 64
  ny: 64
  Lx: 6.283185307179586
  Ly: 6.283185307179586

physics:
  nu: 0.001

time:
  t_final: 1.0
  n_snapshots: 20
  dt_max: 0.01

data:
  n_train_trajectories: 24
  n_test_trajectories: 6

training:
  device: mps
  loss: combined
  noise_level: 0.04
  lr: 0.001
  n_iter: 150
  batch_size: 32
  grad_clip: 1.0

progress:
  enabled: true
  data_generation: true
  training: true
  evaluation: true

rsd:
  basis: fourier
  omega_1_frac: 0.0625
  omega_2_frac: 0.1666666667

paths:
  output_dir: output
  checkpoint_dir: checkpoints

artifacts:
  save_figures: true
  save_fit_visualizations: true
  fit_visualization:
    input:
      cmap: cividis
      border_color: "#2A9D8F"
      border_width: 2.0
    output:
      cmap: RdBu_r
  eval_pair_index: 0
  test_case_index: 0
  test_step_index: 0
