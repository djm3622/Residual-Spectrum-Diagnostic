experiment:
  name: navier_stokes
grid:
  nx: 64
  ny: 64
  Lx: 1.0
  Ly: 1.0
physics:
  nu: 0.01
  forcing:
    type: none
    amplitude: 0.0
    kx: 1
    ky: 2
    omega: 0.5
    phase: 0.0
time:
  t_final: 0.9949990510940552
  n_snapshots: 200
  dt_max: 0.001
data:
  n_train_trajectories: 32
  n_test_trajectories: 12
  initial_condition: line_wave
  initial_n_modes: 1
  initial_kmax: 1
  initial_target_rms: 0.0
  line_axis: diagonal_pos
  line_amplitude: 0.05
  external:
    source: pdebench
    neuraloperator:
      data_path: external_data/neuraloperator
      train_resolution: 64
      test_resolution: 64
      n_train: 0
      n_test: 0
      batch_size: 32
      test_batch_size: 32
      positional_encoding: true
      encode_input: false
      encode_output: false
      channel_dim: 1
      channel_index: 0
      dt: null
    pdebench:
      file_path: external_data/pdebench/2D/NS_incom/ns_incom_inhom_2d_64_omega.h5
      file_paths:
      - external_data/pdebench/2D/NS_incom/ns_incom_inhom_2d_64_omega_[0-9][0-9][0-9].h5
      dataset_key: omega
      layout: NTHW
      channel_index: 0
      time_stride: 1
      spatial_stride: 1
      n_train: 32
      n_test: 12
      shuffle: true
      split_seed_offset: 1207
      dt: 0.004999995231628418
training:
  device: cuda
  loss: combined
  noise_level: 0.04
  lr: 0.001
  n_iter: 500
  batch_size: 32
  grad_clip: 1.0
  rollout_horizon: 10
  rollout_weight: 0.8
  validation_fraction: 0.2
  model_width: 32
  model_depth: 5
  neural_operator:
    common:
      n_modes:
      - 20
      - 20
      hidden_channels: 32
      n_layers: 4
      lifting_channel_ratio: 2.0
      projection_channel_ratio: 2.0
      use_channel_mlp: true
      channel_mlp_expansion: 0.75
      channel_mlp_dropout: 0.0
      fno_skip: linear
      channel_mlp_skip: soft-gating
      norm: null
      domain_padding: 0.0
      implementation: factorized
      separable: false
      rank: 1.0
    tfno:
      hidden_channels: 32
      n_layers: 4
      factorization: Tucker
      rank: 0.2
      temporal:
        enabled: true
        input_steps: 20
        output_steps: 20
        target_mode: next_block
        n_modes_time: 8
    fno:
      hidden_channels: 32
      n_layers: 4
    uno:
      hidden_channels: 32
      n_layers: 4
      lifting_channels: 192
      projection_channels: 192
      channel_mlp_skip: linear
      uno_out_channels:
      - 72
      - 96
      - 96
      - 96
      - 72
      uno_n_modes:
      - - 12
        - 12
      - - 12
        - 12
      - - 12
        - 12
      - - 12
        - 12
      - - 12
        - 12
      uno_scalings:
      - - 1.0
        - 1.0
      - - 0.5
        - 0.5
      - - 1.0
        - 1.0
      - - 1.0
        - 1.0
      - - 2.0
        - 2.0
progress:
  enabled: true
  data_generation: true
  training: true
  evaluation: true
rsd:
  basis: fourier
  omega_1_frac: 0.0625
  omega_2_frac: 0.1666666667
paths:
  output_dir: output
  checkpoint_dir: checkpoints
artifacts:
  save_figures: true
  save_fit_visualizations: true
  save_trajectory_visualizations: true
  fit_visualization:
    input:
      cmap: cividis
      border_color: '#2A9D8F'
      border_width: 2.0
    output:
      cmap: RdBu_r
  trajectory_visualization:
    instance_indices:
    - 0
    - 1
    step_indices:
    - 0
    - 4
    - 8
    - 12
    - 16
    - 19
  eval_pair_index: 0
  test_case_index: 0
  test_step_index: 0
